<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV | Nguyễn Lê Khánh Hòa</title>
  <meta name="description" content="CV Nguyễn Lê Khánh Hòa" />
  <link rel="icon" type="image/png" href="logo.png" />

  <style>
    :root {
      --bg: #08133b;
      --card: rgba(255, 255, 255, 0.10);
      --card-border: rgba(255, 255, 255, 0.10);
      --text: #ffffff;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79, 107, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(111, 134, 255, 0.14), transparent 20%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #header-slot,
    #footer-slot {
      width: 100%;
    }

    .page {
      width: min(1100px, calc(100% - 24px));
      margin: 18px auto 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }

    .hero,
    .viewer,
    .message-box {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .logo-box {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      flex: 0 0 auto;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2vw, 2rem);
      line-height: 1.2;
    }

    .viewer {
      padding: 18px;
    }

    .cv-stage {
      display: flex;
      justify-content: center;
    }

    .cv-image {
      width: min(100%, 900px);
      height: auto;
      display: block;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
    }

    .message-box {
      display: none;
      padding: 18px;
      line-height: 1.6;
      color: #fff;
    }

    .message-box.show {
      display: block;
    }

    @media (max-width: 768px) {
      .page {
        width: min(100%, calc(100% - 12px));
      }

      .hero {
        padding: 16px;
      }

      .logo-box {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="page">
    <section class="hero">
      <div class="logo-box">
        <img src="logo.png" alt="Logo website" />
      </div>
      <h1>CV Nguyễn Lê Khánh Hòa</h1>
    </section>

    <section class="viewer">
      <div class="cv-stage">
        <img
          src="cv.webp"
          alt="CV Nguyễn Lê Khánh Hòa"
          class="cv-image"
          loading="eager"
        />
      </div>
    </section>

    <section id="messageBox" class="message-box"></section>
  </main>

  <div id="footer-slot"></div>

  <script>
    const headerSlot = document.getElementById("header-slot");
    const footerSlot = document.getElementById("footer-slot");
    const messageBox = document.getElementById("messageBox");

    async function loadPartial(fileName, target) {
      try {
        const res = await fetch(fileName, { cache: "no-store" });
        if (!res.ok) throw new Error("Không tải được " + fileName);
        target.innerHTML = await res.text();
        return true;
      } catch (error) {
        console.warn(error);
        target.innerHTML = "";
        return false;
      }
    }

    async function initPartials() {
      const [headerOk, footerOk] = await Promise.all([
        loadPartial("mini-header.html", headerSlot),
        loadPartial("footer.html", footerSlot)
      ]);

      if (!headerOk || !footerOk) {
        messageBox.classList.add("show");
        messageBox.textContent = "Không tải được mini-header.html hoặc footer.html.";
      }
    }

    initPartials();
  </script>
</body>
</html>
