<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV | Nguyễn Lê Khánh Hòa</title>
  <meta name="description" content="Trang hiển thị CV online" />
  <link rel="icon" type="image/png" href="logo.png" />

  <style>
    :root {
      --bg: #08133b;
      --bg-soft: #1f2b5a;
      --card: rgba(255,255,255,0.10);
      --card-border: rgba(255,255,255,0.10);
      --text: #ffffff;
      --muted: #cbd5e1;
      --primary: #4f6bff;
      --primary-2: #6f86ff;
      --shadow: 0 12px 40px rgba(0,0,0,0.22);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,107,255,0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(111,134,255,0.14), transparent 20%),
        var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #header-slot,
    #footer-slot {
      width: 100%;
    }

    .page {
      width: min(1100px, calc(100% - 24px));
      margin: 18px auto 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }

    .hero,
    .viewer,
    .message-box {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero {
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo-box {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      flex: 0 0 auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-text h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 2vw, 2rem);
      line-height: 1.2;
    }

    .hero-text p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: #fff;
      box-shadow: 0 6px 18px rgba(79,107,255,0.35);
    }

    .viewer {
      padding: 18px;
    }

    .viewer-top h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .viewer-top p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .cv-stage {
      margin-top: 16px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: center;
    }

    .cv-image {
      width: min(100%, 900px);
      height: auto;
      display: block;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(0,0,0,0.18);
    }

    .message-box {
      display: none;
      padding: 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .message-box.show {
      display: block;
    }

    @media (max-width: 768px) {
      .page {
        width: min(100%, calc(100% - 12px));
      }

      .hero {
        padding: 16px;
      }

      .hero-left {
        align-items: flex-start;
      }

      .logo-box {
        width: 50px;
        height: 50px;
      }

      .cv-stage {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-left">
        <div class="logo-box">
          <img src="logo.png" alt="Logo website">
        </div>
        <div class="hero-text">
          <h1>CV Nguyễn Lê Khánh Hòa</h1>
          <p>Trang CV chỉ để xem online, không dùng PDF nhúng để tránh lỗi bị trình duyệt hoặc extension bắt tải xuống.</p>
        </div>
      </div>

      <div class="badge">Xem online</div>
    </section>

    <section class="viewer">
      <div class="viewer-top">
        <h2>Xem CV</h2>
        <p>CV được hiển thị trực tiếp dưới dạng ảnh toàn trang để tránh lỗi trắng khung và lỗi ép tải file PDF.</p>
      </div>

      <div class="cv-stage">
        <img
          src="cv.webp"
          alt="CV Nguyễn Lê Khánh Hòa"
          class="cv-image"
          loading="eager"
        />
      </div>
    </section>

    <section id="messageBox" class="message-box"></section>
  </main>

  <div id="footer-slot"></div>

  <script>
    const headerSlot = document.getElementById("header-slot");
    const footerSlot = document.getElementById("footer-slot");
    const messageBox = document.getElementById("messageBox");

    async function loadPartial(fileName, target) {
      try {
        const res = await fetch(fileName, { cache: "no-store" });
        if (!res.ok) throw new Error("Không tải được " + fileName);
        target.innerHTML = await res.text();
        return true;
      } catch (error) {
        console.warn(error);
        target.innerHTML = "";
        return false;
      }
    }

    async function initPartials() {
      const [headerOk, footerOk] = await Promise.all([
        loadPartial("mini-header.html", headerSlot),
        loadPartial("footer.html", footerSlot)
      ]);

      if (!headerOk || !footerOk) {
        messageBox.classList.add("show");
        messageBox.innerHTML =
          "Không tải được <strong>mini-header.html</strong> hoặc <strong>footer.html</strong>. Hãy kiểm tra 2 file này có nằm cùng thư mục với <strong>cv.html</strong> hay không.";
      }
    }

    initPartials();
  </script>
</body>
</html>
