<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curriculum Vitae | Nguyen Le Khanh Hoa</title>
  <meta name="description" content="CV Nguyễn Lê Khánh Hòa" />
  <link rel="icon" type="image/png" href="logo.png" />

  <style>
    :root {
      --bg: #08133b;
      --card: rgba(255, 255, 255, 0.1);
      --card-solid: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.88);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      --radius: 24px;
      --radius-sm: 16px;
      --btn-bg: linear-gradient(135deg, #4f6bff, #6f86ff);
      --btn-shadow: 0 8px 24px rgba(79, 107, 255, 0.35);
      --container: 1100px;
      --space: clamp(12px, 2vw, 20px);
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 107, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(111, 134, 255, 0.14), transparent 20%),
        var(--bg);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    a,
    button {
      -webkit-tap-highlight-color: transparent;
    }

    #header-slot,
    #footer-slot {
      width: 100%;
    }

    .page {
      width: min(var(--container), calc(100% - 32px));
      margin: 18px auto 28px;
      display: flex;
      flex-direction: column;
      gap: var(--space);
      flex: 1;
    }

    .hero,
    .viewer,
    .message-box {
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--card-solid);
      overflow: hidden;
    }

    /* Dùng blur nếu trình duyệt hỗ trợ */
    @supports ((-webkit-backdrop-filter: blur(12px)) or (backdrop-filter: blur(12px))) {
      .hero,
      .viewer,
      .message-box {
        background: var(--card);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
      }
    }

    .hero {
      padding: clamp(16px, 2.2vw, 24px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .hero-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1 1 420px;
      min-width: 0;
    }

    .logo-box {
      width: clamp(50px, 6vw, 60px);
      height: clamp(50px, 6vw, 60px);
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
      flex: 0 0 auto;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.3vw, 2rem);
      line-height: 1.25;
      word-break: break-word;
    }

    .hero-subtext {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.6vw, 1rem);
      line-height: 1.5;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex: 0 1 auto;
      flex-wrap: wrap;
    }

    .detail-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--btn-bg);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.98rem;
      box-shadow: var(--btn-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
      text-align: center;
    }

    .detail-btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
      box-shadow: 0 12px 30px rgba(79, 107, 255, 0.42);
    }

    .detail-btn:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 3px;
    }

    .viewer {
      padding: clamp(12px, 2vw, 20px);
    }

    .cv-stage {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: hidden;
    }

    .cv-image {
      width: min(100%, 900px);
      height: auto;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
      object-fit: contain;
    }

    .message-box {
      display: none;
      padding: 18px;
      line-height: 1.6;
      color: #fff;
      word-break: break-word;
    }

    .message-box.show {
      display: block;
    }

    /* Tablet */
    @media (max-width: 992px) {
      .page {
        width: min(var(--container), calc(100% - 24px));
      }

      .hero {
        align-items: flex-start;
      }

      .hero-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      :root {
        --radius: 18px;
      }

      .page {
        width: calc(100% - 16px);
        margin: 12px auto 20px;
      }

      .hero {
        padding: 14px;
        gap: 14px;
      }

      .hero-left {
        flex: 1 1 100%;
        align-items: flex-start;
      }

      .hero-actions {
        width: 100%;
      }

      .detail-btn {
        width: 100%;
        min-width: 0;
      }

      .viewer {
        padding: 12px;
      }

      .cv-image {
        border-radius: 12px;
      }
    }

    /* Màn hình rất nhỏ */
    @media (max-width: 420px) {
      .hero-left {
        gap: 10px;
      }

      .hero h1 {
        font-size: 1.05rem;
      }

      .hero-subtext {
        font-size: 0.9rem;
      }

      .logo-box {
        border-radius: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="page">
    <section class="hero">
      <div class="hero-left">
        <div class="logo-box">
          <img src="logo.png" alt="Logo website" />
        </div>

        <div class="hero-title">
          <h1>Curriculum Vitae Nguyen Le Khanh Hoa</h1>
          <p class="hero-subtext">Bản Tóm Tắt</p>
        </div>
      </div>

      <div class="hero-actions">
        <a href="cv2.html" class="detail-btn">Hiển thị chi tiết</a>
      </div>
    </section>

    <section class="viewer">
      <div class="cv-stage">
        <img
          src="cv.webp"
          alt="CV Nguyễn Lê Khánh Hòa"
          class="cv-image"
          loading="eager"
        />
      </div>
    </section>

    <section id="messageBox" class="message-box"></section>
  </main>

  <div id="footer-slot"></div>

  <script>
    const headerSlot = document.getElementById("header-slot");
    const footerSlot = document.getElementById("footer-slot");
    const messageBox = document.getElementById("messageBox");

    async function loadPartial(fileName, target) {
      try {
        const res = await fetch(fileName, { cache: "no-store" });
        if (!res.ok) throw new Error("Không tải được " + fileName);
        target.innerHTML = await res.text();
        return true;
      } catch (error) {
        console.warn(error);
        target.innerHTML = "";
        return false;
      }
    }

    async function initPartials() {
      const [headerOk, footerOk] = await Promise.all([
        loadPartial("mini-header.html", headerSlot),
        loadPartial("footer.html", footerSlot)
      ]);

      if (!headerOk || !footerOk) {
        messageBox.classList.add("show");
        messageBox.textContent = "Không tải được mini-header.html hoặc footer.html.";
      }
    }

    initPartials();
  </script>
</body>
</html>
