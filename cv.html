<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV | Nguyễn Lê Khánh Hòa</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0b1437;
      font-family: Arial, sans-serif;
    }
    #header-slot, #footer-slot {
      width: 100%;
    }
    .page {
      width: min(1200px, calc(100% - 24px));
      margin: 20px auto;
    }
    .viewer {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
    }
    .viewer h2 {
      color: #fff;
      margin: 0 0 8px;
    }
    .viewer p {
      color: #cbd5e1;
      margin: 0 0 12px;
    }
    .pdf-box {
      height: 78vh;
      min-height: 620px;
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }
    .pdf-box iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .btns {
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: #fff;
      color: #111827;
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="page">
    <section class="viewer">
      <h2>Xem CV PDF</h2>
      <p>Nếu file PDF bị server ép tải xuống, dùng PDF.js viewer sẽ ổn hơn.</p>

      <div class="btns">
        <a class="btn" href="cv.pdf" target="_blank">Mở PDF riêng</a>
      </div>

      <div class="pdf-box">
        <iframe
          src="https://mozilla.github.io/pdf.js/web/viewer.html?file=https://koha.io.vn/cv.pdf"
          title="CV PDF"
        ></iframe>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script>
    async function loadPartial(fileName, targetId) {
      try {
        const res = await fetch(fileName, { cache: "no-store" });
        if (!res.ok) throw new Error(fileName);
        document.getElementById(targetId).innerHTML = await res.text();
      } catch (e) {
        console.warn("Không tải được:", fileName);
      }
    }

    loadPartial("mini-header.html", "header-slot");
    loadPartial("footer.html", "footer-slot");
  </script>
</body>
</html>
