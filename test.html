<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giá xăng dầu, vàng và bạc trong nước</title>
  <style>
    :root {
      --bg: #09111f;
      --bg-soft: #0e1930;
      --card: rgba(16, 25, 46, 0.95);
      --card-2: rgba(20, 32, 58, 0.95);
      --text: #edf3ff;
      --muted: #aab7d3;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #4c8dff;
      --gold: #f7d25c;
      --up: #98f0bb;
      --down: #ffb8b8;
      --neutral: #ffe08a;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76, 141, 255, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(247, 210, 92, 0.14), transparent 18%),
        linear-gradient(180deg, #07101d 0%, #0b1425 100%);
      min-height: 100vh;
    }

    #header-slot, #footer-slot { width: 100%; }

    .container {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
      margin-bottom: 18px;
      align-items: stretch;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(8px);
    }

    .hero-title {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .hero-sub,
    .hero-badges,
    .badge { display: none; }

    .meta-grid {
      display: grid;
      gap: 12px;
      height: 100%;
    }

    .meta-item {
      padding: 14px;
      border-radius: 16px;
      background: var(--card-2);
      border: 1px solid var(--line);
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .meta-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.45;
    }

    .meta-value.small {
      font-size: 14px;
      font-weight: 700;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .fuel-toolbar {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 220px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-2);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(76, 141, 255, 0.55);
    }

    .ghost-btn {
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-2);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,25,46,0.98), rgba(12,20,38,0.98));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .card-title {
      min-height: 42px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    .card-price {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .card-sub {
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted);
    }

    .up { color: var(--up); font-weight: 800; }
    .down { color: var(--down); font-weight: 800; }
    .flat { color: var(--neutral); font-weight: 800; }

    .gold-main { color: #fff2bf; }
    .silver-main { color: #dbe6f6; }

    .muted-row {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.55;
    }

    .error-box {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 136, 136, 0.14);
      background: rgba(255, 107, 107, 0.08);
      color: #ffcaca;
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 140px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 24px;
    }

    @media (max-width: 1100px) {
      .hero { grid-template-columns: 1fr; }
      .container { width: min(100% - 24px, 1280px); }
    }

    @media (max-width: 768px) {
      .container {
        width: min(100% - 16px, 1280px);
        padding: 14px 0 28px;
      }
      .panel { padding: 16px; }
      .hero-title { font-size: 30px; }
      .cards { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card-price { font-size: 22px; }
    }

    @media (max-width: 560px) {
      .container { width: calc(100% - 12px); }
      .panel { padding: 14px; border-radius: 16px; }
      .cards { grid-template-columns: 1fr; }
      .card { min-height: unset; padding: 16px; }
      .card-title { min-height: unset; }
      .section-head { align-items: start; }
      .section-head h2 { font-size: 22px; }
      .fuel-toolbar { flex-direction: column; align-items: stretch; }
      .field { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <section class="hero">
      <div class="panel">
        <h1 class="hero-title">Giá xăng dầu, vàng và bạc</h1>
      </div>

      <div class="panel">
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Cập nhật xăng dầu</div>
            <div class="meta-value" id="fuelUpdatedAt">--</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Cập nhật giá vàng</div>
            <div class="meta-value" id="goldUpdatedAt">--</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Cập nhật giá bạc</div>
            <div class="meta-value" id="silverUpdatedAt">--</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Nguồn hiển thị</div>
            <div class="meta-value small" id="sourceNames">--</div>
          </div>
        </div>
      </div>
    </section>

    <section class="sections">
      <section class="panel">
        <div id="errorBox" class="error-box"></div>
        <div class="fuel-toolbar">
          <div class="field">
            <label for="fuelDateInput">Chọn ngày giá xăng</label>
            <input id="fuelDateInput" type="date" />
          </div>
          <button id="fuelTodayBtn" type="button" class="ghost-btn">Mặc định hôm nay</button>
        </div>
        <div class="section-head">
          <div>
            <h2>Giá xăng dầu</h2>
            <p>Cập nhật theo dữ liệu hiện có</p>
          </div>
        </div>
        <div id="fuelCards" class="cards"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>Giá vàng BTMC</h2>
            <p>Giá trong nước</p>
          </div>
        </div>
        <div id="goldCards" class="cards"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <h2>Giá bạc BTMC</h2>
            <p>Giá trong nước</p>
          </div>
        </div>
        <div id="silverCards" class="cards"></div>
      </section>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script>
    const REFRESH_MS = 5 * 60 * 1000;
    const FUEL_API_BASE = 'https://giaxanghomnay.com/api/pvdate/';
    const BTMC_API_URL = 'https://api.btmc.vn/api/BTMCAPI/getpricebtmc?key=3kd8ub1llcg9t45hnoh8hmn7t5kc2v';
    const BTMC_EMBEDDED_XML = `
<DataList>
<Data row="1" n_1="VÀNG MIẾNG SJC (Vàng SJC)" pb_1="16980000" ps_1="17280000" d_1="28/03/2026 09:25"/>

<Data row="3" n_3="VÀNG MIẾNG VRTL (Vàng Rồng Thăng Long)" pb_3="16980000" ps_3="17280000" d_3="28/03/2026 09:25"/>
<Data row="4" n_4="BẢN VÀNG ĐẮC LỘC (Vàng Rồng Thăng Long)" pb_4="16980000" ps_4="17280000" d_4="28/03/2026 09:25"/>
<Data row="5" n_5="QUÀ MỪNG BẢN VỊ VÀNG (Quà Mừng Bản Vị Vàng)" pb_5="16980000" ps_5="17280000" d_5="28/03/2026 09:25"/>
<Data row="6" n_6="TRANG SỨC VÀNG RỒNG THĂNG LONG 999.9 (Vàng BTMC)" pb_6="16780000" ps_6="17180000" d_6="28/03/2026 09:25"/>

<Data row="8" n_8="VÀNG THƯƠNG HIỆU DOJI, PNJ, PHÚ QUÝ. (Vàng Đối Tác)" pb_8="16980000" ps_8="0" d_8="28/03/2026 09:25"/>
<Data row="9" n_9="NHẪN TRÒN TRƠN (Vàng Rồng Thăng Long)" pb_9="16980000" ps_9="17280000" d_9="28/03/2026 09:25"/>
<Data row="10" n_10="VÀNG NGUYÊN LIỆU (Vàng thị trường)" pb_10="16150000" ps_10="0" d_10="28/03/2026 09:25"/>
<Data row="41" n_41="BẠC THỎI 2025 ANCARAT 999 1 KG (1000 GRAM) (ANCARAT)" pb_41="69000000" ps_41="71100000" d_41="28/03/2026 08:34"/>
<Data row="42" n_42="BẠC THỎI 2025 ANCARAT 999 10 LƯỢNG (375 GRAM) (ANCARAT)" pb_42="26190000" ps_42="27000000" d_42="28/03/2026 08:34"/>
<Data row="43" n_43="BẠC THỎI 2025 ANCARAT 999 0.5 KG (500 GRAM) (ANCARAT)" pb_43="34500000" ps_43="35550000" d_43="28/03/2026 08:34"/>
<Data row="44" n_44="BẠC MIẾNG PHÚ QUÝ Ag 999 1 KG 1000 GRAM (PHÚ QUÝ)" pb_44="69893159" ps_44="72053153" d_44="28/03/2026 08:34"/>
<Data row="45" n_45="BẠC BẮC SƯ TỬ ANCARAT 999 5 LƯỢNG (ANCARAT)" pb_45="13095000" ps_45="13500000" d_45="28/03/2026 08:34"/>
<Data row="46" n_46="BẠC MIẾNG PHÚ QUÝ Ag 999 5 LƯỢNG (PHÚ QUÝ)" pb_46="13105000" ps_46="13510000" d_46="28/03/2026 08:34"/>
<Data row="47" n_47="BẠC MIẾNG BẠC RỒNG THĂNG LONG Ag 999 1 KG (BẠC RỒNG THĂNG LONG Ag 999)" pb_47="69893159" ps_47="72053153" d_47="28/03/2026 08:34"/>
<Data row="48" n_48="BẠC MIẾNG PHÚ QUÝ Ag 999 1 LƯỢNG (PHÚ QUÝ)" pb_48="2621000" ps_48="2702000" d_48="28/03/2026 08:34"/>
<Data row="49" n_49="BẠC MIẾNG BẠC RỒNG THĂNG LONG Ag 999 5 LƯỢNG (BẠC RỒNG THĂNG LONG Ag 999)" pb_49="13105000" ps_49="13510000" d_49="28/03/2026 08:34"/>
<Data row="50" n_50="BẠC MIẾNG BẠC RỒNG THĂNG LONG Ag 999 0,5 KG (BẠC RỒNG THĂNG LONG Ag 999)" pb_50="34946580" ps_50="36026577" d_50="28/03/2026 08:34"/>
<Data row="51" n_51="BẠC MIẾNG BẠC RỒNG THĂNG LONG Ag 999 1 LƯỢNG (BẠC RỒNG THĂNG LONG Ag 999)" pb_51="2621000" ps_51="2702000" d_51="28/03/2026 08:34"/>
</DataList>`;

    const headerSlot = document.getElementById('header-slot');
    const footerSlot = document.getElementById('footer-slot');
    const fuelCards = document.getElementById('fuelCards');
    const goldCards = document.getElementById('goldCards');
    const silverCards = document.getElementById('silverCards');
    const fuelUpdatedAt = document.getElementById('fuelUpdatedAt');
    const goldUpdatedAt = document.getElementById('goldUpdatedAt');
    const silverUpdatedAt = document.getElementById('silverUpdatedAt');
    const sourceNames = document.getElementById('sourceNames');
    const errorBox = document.getElementById('errorBox');
    const fuelDateInput = document.getElementById('fuelDateInput');
    const fuelTodayBtn = document.getElementById('fuelTodayBtn');

    function formatDateTime(value) {
      if (!value) return '--';
      const text = String(value).trim();
      const m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})(.*)$/);
      const normalized = m ? `${m[3]}-${m[2]}-${m[1]}${m[4] || ''}` : text;
      const d = new Date(normalized);
      if (Number.isNaN(d.getTime())) return text;
      return d.toLocaleString('vi-VN');
    }

    function formatNumber(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '--';
      return num.toLocaleString('vi-VN');
    }

    function formatMoney(value, unit) {
      return `${formatNumber(value)} ${unit || ''}`.trim();
    }

    function deltaClass(value) {
      const num = Number(value || 0);
      if (num > 0) return 'up';
      if (num < 0) return 'down';
      return 'flat';
    }

    function deltaText(item) {
      const change = Number(item.change || 0);
      if (change > 0) return `▲ Tăng ${formatMoney(Math.abs(change), item.unit)}`;
      if (change < 0) return `▼ Giảm ${formatMoney(Math.abs(change), item.unit)}`;
      return '— Không đổi';
    }

    function normalizeFuelName(name) {
      return String(name || '')
        .toLowerCase()
        .replace(/dầu ko/g, 'dầu hỏa 2-k')
        .replace(/dầu hỏa/g, 'dầu hỏa 2-k')
        .replace(/\s+/g, ' ')
        .trim();
    }

    async function loadPartial(fileName, target) {
      try {
        const res = await fetch(fileName, { cache: 'no-store' });
        if (!res.ok) throw new Error();
        target.innerHTML = await res.text();
      } catch {
        target.innerHTML = '';
      }
    }

    function getAttrByPrefix(node, prefix) {
      const attr = node.getAttributeNames().find(name => name.startsWith(prefix));
      return attr ? node.getAttribute(attr) : null;
    }

    function parseBTMCNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function parseBTMCXml(xmlText) {
      const safeXml = String(xmlText || '').replace(/<script[^>]*\/>/g, '');
      const xml = new DOMParser().parseFromString(safeXml, 'application/xml');
      const rows = [...xml.querySelectorAll('Data')];
      if (!rows.length) throw new Error('BTMC: không đọc được XML');

      const metals = rows.map(row => {
        const name = getAttrByPrefix(row, 'n_') || 'Không rõ tên';
        const buy = parseBTMCNumber(getAttrByPrefix(row, 'pb_'));
        const sell = parseBTMCNumber(getAttrByPrefix(row, 'ps_'));
        const updatedAt = getAttrByPrefix(row, 'd_');
        return { name, buy, sell, updatedAt };
      }).filter(item => item.buy != null || item.sell != null);

      const dedupeByName = list => {
        const map = new Map();
        for (const item of list) {
          if (!map.has(item.name)) map.set(item.name, item);
        }
        return [...map.values()];
      };

      const goldItems = dedupeByName(metals.filter(item => !/^bạc/i.test(item.name))).slice(0, 12);
      const silverItems = dedupeByName(metals.filter(item => /^bạc/i.test(item.name))).slice(0, 12);

      return {
        gold: {
          source: 'BTMC',
          updatedAt: goldItems[0]?.updatedAt || new Date().toISOString(),
          items: goldItems.map(item => ({ ...item, unit: 'đ/lượng' }))
        },
        silver: {
          source: 'BTMC',
          updatedAt: silverItems[0]?.updatedAt || new Date().toISOString(),
          items: silverItems.map(item => ({ ...item, unit: 'đ/sản phẩm' }))
        }
      };
    }

    async function fetchBTMCData() {
      try {
        const res = await fetch(`${BTMC_API_URL}&t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`BTMC: HTTP ${res.status}`);
        const xmlText = await res.text();
        const parsed = parseBTMCXml(xmlText);
        parsed.gold.source = 'BTMC API';
        parsed.silver.source = 'BTMC API';
        return parsed;
      } catch {
        const parsed = parseBTMCXml(BTMC_EMBEDDED_XML);
        parsed.gold.source = 'BTMC XML nội bộ';
        parsed.silver.source = 'BTMC XML nội bộ';
        return parsed;
      }
    }

    function formatDateForApi(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function minusDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() - days);
      return next;
    }

    async function fetchFuelData(selectedDateValue = '') {
      const today = selectedDateValue ? new Date(`${selectedDateValue}T00:00:00`) : new Date();
      let lastError = null;

      for (let i = 0; i < 7; i++) {
        const candidate = minusDays(today, i);
        const dateStr = formatDateForApi(candidate);
        const url = `${FUEL_API_BASE}${dateStr}`;

        try {
          const res = await fetch(`${url}?t=${Date.now()}`, { cache: 'no-store' });
          if (!res.ok) {
            lastError = new Error(`Xăng dầu: HTTP ${res.status}`);
            continue;
          }

          const raw = await res.json();
          const currentRows = Array.isArray(raw?.[0]) ? raw[0] : [];
          const previousRows = Array.isArray(raw?.[2]) ? raw[2] : [];

          if (!currentRows.length) {
            lastError = new Error('Xăng dầu: không có dữ liệu');
            continue;
          }

          const previousMap = new Map(previousRows.map(item => [normalizeFuelName(item.title), item]));

          const items = currentRows.map(item => {
            const prev = previousMap.get(normalizeFuelName(item.title));
            const zone1 = Number(item.zone1_price ?? item.price ?? 0);
            const zone2 = Number(item.zone2_price ?? 0);
            const prevZone1 = Number(prev?.zone1_price ?? prev?.price ?? zone1);
            const prevZone2 = Number(prev?.zone2_price ?? zone2);

            return {
              name: item.title || 'Không rõ tên',
              price: zone1,
              unit: 'đ/lít',
              zone2_price: item.zone2_price ?? null,
              change: zone1 - prevZone1,
              prev_price: prevZone1,
              zone2_change: item.zone2_price != null && prev ? zone2 - prevZone2 : null,
              note: item.zone2_price != null ? `Vùng 2: ${formatMoney(zone2, 'đ/lít')}` : ''
            };
          });

          return {
            source: 'giaxanghomnay.com',
            updatedAt: currentRows[0]?.updated_at || currentRows[0]?.date || new Date().toISOString(),
            items
          };
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error('Xăng dầu: không tải được dữ liệu gần nhất');
    }

    function renderFuel(data) {
      const items = Array.isArray(data?.items) ? data.items : [];
      fuelCards.innerHTML = '';

      if (!items.length) {
        fuelCards.innerHTML = '<div class="empty">Chưa có dữ liệu xăng dầu.</div>';
        fuelUpdatedAt.textContent = '--';
        return;
      }

      items.forEach(item => {
        const zone2ChangeText = item.zone2_change == null
          ? ''
          : `<div class="muted-row ${deltaClass(item.zone2_change)}">Vùng 2: ${item.zone2_change > 0 ? '▲ Tăng' : item.zone2_change < 0 ? '▼ Giảm' : '— Không đổi'}${item.zone2_change === 0 ? '' : ` ${formatMoney(Math.abs(item.zone2_change), 'đ/lít')}`}</div>`;

        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">${item.name || 'Không rõ tên'}</div>
          <div class="card-price">${formatMoney(item.price, item.unit)}</div>
          <div class="card-sub ${deltaClass(item.change)}">${deltaText(item)}</div>
          ${item.note ? `<div class="muted-row">${item.note}</div>` : ''}
          ${item.prev_price != null ? `<div class="muted-row">Kỳ trước: ${formatMoney(item.prev_price, item.unit)}</div>` : ''}
          ${zone2ChangeText}
        `;
        fuelCards.appendChild(card);
      });

      fuelUpdatedAt.textContent = formatDateTime(data.updatedAt);
    }

    function renderMetal(cardsEl, updatedEl, data, emptyText, mainClass) {
      const items = Array.isArray(data?.items) ? data.items : [];
      cardsEl.innerHTML = '';

      if (!items.length) {
        cardsEl.innerHTML = `<div class="empty">${emptyText}</div>`;
        updatedEl.textContent = '--';
        return;
      }

      items.forEach(item => {
        const spread = Number.isFinite(Number(item.buy)) && Number.isFinite(Number(item.sell))
          ? Number(item.sell) - Number(item.buy)
          : null;

        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">${item.name || 'Không rõ tên'}</div>
          <div class="card-price ${mainClass}">Mua ${formatMoney(item.buy, item.unit)}</div>
          <div class="card-sub">Bán ${formatMoney(item.sell, item.unit)}</div>
          <div class="card-sub ${spread === null ? 'flat' : deltaClass(spread)}">${spread === null ? '' : `Chênh lệch ${formatMoney(spread, item.unit)}`}</div>
        `;
        cardsEl.appendChild(card);
      });

      updatedEl.textContent = formatDateTime(data.updatedAt);
    }

    function showError(message) {
      if (!message) {
        errorBox.textContent = '';
        errorBox.style.display = 'none';
        return;
      }
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function renderEmptyFuel(message = 'Chưa có dữ liệu xăng dầu.') {
      fuelCards.innerHTML = `<div class="empty">${message}</div>`;
      fuelUpdatedAt.textContent = '--';
    }

    function renderEmptyGold(message = 'Chưa có dữ liệu giá vàng.') {
      goldCards.innerHTML = `<div class="empty">${message}</div>`;
      goldUpdatedAt.textContent = '--';
    }

    function renderEmptySilver(message = 'Chưa có dữ liệu giá bạc.') {
      silverCards.innerHTML = `<div class="empty">${message}</div>`;
      silverUpdatedAt.textContent = '--';
    }

    async function refreshAll() {
      showError('');

      const [fuelResult, btmcResult] = await Promise.allSettled([
        fetchFuelData(fuelDateInput.value),
        fetchBTMCData()
      ]);

      const errors = [];
      let fuelSource = 'API xăng dầu';
      let goldSource = 'BTMC';
      let silverSource = 'BTMC';

      if (fuelResult.status === 'fulfilled') {
        const fuelData = fuelResult.value;
        renderFuel(fuelData);
        fuelSource = fuelData.source || fuelSource;
      } else {
        renderEmptyFuel('Không tải được dữ liệu xăng dầu.');
        errors.push(`Xăng dầu lỗi: ${fuelResult.reason?.message || 'Không rõ nguyên nhân'}`);
      }

      if (btmcResult.status === 'fulfilled') {
        const btmcData = btmcResult.value;
        renderMetal(goldCards, goldUpdatedAt, btmcData.gold, 'Chưa có dữ liệu giá vàng.', 'gold-main');
        renderMetal(silverCards, silverUpdatedAt, btmcData.silver, 'Chưa có dữ liệu giá bạc.', 'silver-main');
        goldSource = btmcData.gold.source || goldSource;
        silverSource = btmcData.silver.source || silverSource;
      } else {
        renderEmptyGold('Không tải được dữ liệu giá vàng.');
        renderEmptySilver('Không tải được dữ liệu giá bạc.');
        errors.push(`BTMC lỗi: ${btmcResult.reason?.message || 'Không rõ nguyên nhân'}`);
      }

      sourceNames.textContent = `${fuelSource} | ${goldSource} | ${silverSource}`;
      if (errors.length) showError(errors.join(' | '));
    }

    function syncFuelDateDefault() {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      fuelDateInput.value = `${y}-${m}-${d}`;
      fuelDateInput.max = `${y}-${m}-${d}`;
    }

    fuelDateInput.addEventListener('change', () => {
      refreshAll();
    });

    fuelTodayBtn.addEventListener('click', () => {
      syncFuelDateDefault();
      refreshAll();
    });

    Promise.all([
      loadPartial('header.html', headerSlot),
      loadPartial('footer.html', footerSlot)
    ]).finally(() => {
      syncFuelDateDefault();
      refreshAll();
      setInterval(refreshAll, REFRESH_MS);
    });
  </script>
</body>
</html>
