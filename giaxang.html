<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giá xăng dầu trong nước</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="shortcut icon" href="logo.png" />
  <style>
    :root {
      --bg: #09111f;
      --bg-soft: #0e1930;
      --card: rgba(16, 25, 46, 0.95);
      --card-2: rgba(20, 32, 58, 0.95);
      --text: #edf3ff;
      --muted: #aab7d3;
      --line: rgba(255, 255, 255, 0.08);
      --accent: #4c8dff;
      --up: #98f0bb;
      --down: #ffb8b8;
      --neutral: #ffe08a;
      --shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76, 141, 255, 0.18), transparent 26%),
        linear-gradient(180deg, #07101d 0%, #0b1425 100%);
      min-height: 100vh;
    }

    #header-slot, #footer-slot { width: 100%; }

    .container {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
      margin-bottom: 18px;
      align-items: stretch;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(8px);
    }

    .hero-title {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .meta-grid {
      display: grid;
      gap: 12px;
      height: 100%;
    }

    .meta-item {
      padding: 14px;
      border-radius: 16px;
      background: var(--card-2);
      border: 1px solid var(--line);
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .meta-value {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.45;
    }

    .meta-value.small {
      font-size: 14px;
      font-weight: 700;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .fuel-toolbar {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 220px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-2);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .field input:focus {
      border-color: rgba(76, 141, 255, 0.55);
    }

    .ghost-btn {
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--card-2);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(16,25,46,0.98), rgba(12,20,38,0.98));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow);
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .card-title {
      min-height: 42px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    .card-price {
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .card-sub {
      font-size: 14px;
      line-height: 1.65;
      color: var(--muted);
    }

    .up { color: var(--up); font-weight: 800; }
    .down { color: var(--down); font-weight: 800; }
    .flat { color: var(--neutral); font-weight: 800; }

    .muted-row {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.55;
    }

    .error-box {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 136, 136, 0.14);
      background: rgba(255, 107, 107, 0.08);
      color: #ffcaca;
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 140px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 24px;
    }

    .is-loading {
      opacity: 0.78;
    }

    @media (max-width: 1100px) {
      .hero { grid-template-columns: 1fr; }
      .container { width: min(100% - 24px, 1280px); }
    }

    @media (max-width: 768px) {
      .container {
        width: min(100% - 16px, 1280px);
        padding: 14px 0 28px;
      }
      .panel { padding: 16px; }
      .hero-title { font-size: 30px; }
      .cards { grid-template-columns: 1fr 1fr; gap: 12px; }
      .card-price { font-size: 22px; }
    }

    @media (max-width: 560px) {
      .container { width: calc(100% - 12px); }
      .panel { padding: 14px; border-radius: 16px; }
      .cards { grid-template-columns: 1fr; }
      .card { min-height: unset; padding: 16px; }
      .card-title { min-height: unset; }
      .section-head { align-items: start; }
      .section-head h2 { font-size: 22px; }
      .fuel-toolbar { flex-direction: column; align-items: stretch; }
      .field { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <main class="container">
    <section class="hero">
      <div class="panel">
        <h1 class="hero-title">Giá xăng dầu</h1>
      </div>

      <div class="panel">
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Cập nhật xăng dầu</div>
            <div class="meta-value" id="fuelUpdatedAt">--</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Nguồn hiển thị</div>
            <div class="meta-value small" id="sourceNames">--</div>
          </div>
        </div>
      </div>
    </section>

    <section class="sections">
      <section class="panel">
        <div id="errorBox" class="error-box"></div>
        <div class="fuel-toolbar">
          <div class="field">
            <label for="fuelDateInput">Chọn ngày giá xăng</label>
            <input id="fuelDateInput" type="date" />
          </div>
          <button id="fuelTodayBtn" type="button" class="ghost-btn">Mặc định hôm nay</button>
        </div>
        <div class="section-head">
          <div>
            <h2>Giá xăng dầu</h2>
            <p>Cập nhật theo dữ liệu hiện có</p>
          </div>
        </div>
        <div id="fuelCards" class="cards"></div>
      </section>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script>
    const REFRESH_MS = 5 * 60 * 1000;
    const FUEL_API_BASE = 'https://giaxanghomnay.com/api/pvdate/';
    const CACHE_KEYS = {
      fuel: 'depdocla_price_fuel_cache_v3'
    };

    const NETWORK_TIMEOUT_MS = 2500;
    const FUEL_FALLBACK_DAYS = 2;

    const headerSlot = document.getElementById('header-slot');
    const footerSlot = document.getElementById('footer-slot');
    const fuelCards = document.getElementById('fuelCards');
    const fuelUpdatedAt = document.getElementById('fuelUpdatedAt');
    const sourceNames = document.getElementById('sourceNames');
    const errorBox = document.getElementById('errorBox');
    const fuelDateInput = document.getElementById('fuelDateInput');
    const fuelTodayBtn = document.getElementById('fuelTodayBtn');

    let currentFuelSource = '--';

    function formatDateTime(value) {
      if (!value) return '--';
      const text = String(value).trim();
      const m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})(.*)$/);
      const normalized = m ? `${m[3]}-${m[2]}-${m[1]}${m[4] || ''}` : text;
      const d = new Date(normalized);
      if (Number.isNaN(d.getTime())) return text;
      return d.toLocaleString('vi-VN');
    }

    function formatNumber(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '--';
      return num.toLocaleString('vi-VN');
    }

    function formatMoney(value, unit) {
      return `${formatNumber(value)} ${unit || ''}`.trim();
    }

    function deltaClass(value) {
      const num = Number(value || 0);
      if (num > 0) return 'up';
      if (num < 0) return 'down';
      return 'flat';
    }

    function deltaText(item) {
      const change = Number(item.change || 0);
      if (change > 0) return `▲ Tăng ${formatMoney(Math.abs(change), item.unit)}`;
      if (change < 0) return `▼ Giảm ${formatMoney(Math.abs(change), item.unit)}`;
      return '— Không đổi';
    }

    function normalizeFuelName(name) {
      return String(name || '')
        .toLowerCase()
        .replace(/dầu ko/g, 'dầu hỏa 2-k')
        .replace(/dầu hỏa/g, 'dầu hỏa 2-k')
        .replace(/\s+/g, ' ')
        .trim();
    }

    async function loadPartial(fileName, target) {
      try {
        const res = await fetch(fileName, { cache: 'no-store' });
        if (!res.ok) throw new Error();
        target.innerHTML = await res.text();
      } catch {
        target.innerHTML = '';
      }
    }

    function safeJsonParse(value) {
      try {
        return JSON.parse(value);
      } catch {
        return null;
      }
    }

    function setCache(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify({
          savedAt: Date.now(),
          data
        }));
      } catch {}
    }

    function getCache(key, maxAgeMs = 12 * 60 * 60 * 1000) {
      try {
        const parsed = safeJsonParse(localStorage.getItem(key));
        if (!parsed?.data || !parsed?.savedAt) return null;
        if (Date.now() - Number(parsed.savedAt) > maxAgeMs) return null;
        return parsed.data;
      } catch {
        return null;
      }
    }

    function withTimeout(promiseFactory, ms) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), ms);
      return promiseFactory(controller.signal).finally(() => clearTimeout(timer));
    }

    function formatDateForApi(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function minusDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() - days);
      return next;
    }

    function showError(message) {
      if (!message) {
        errorBox.textContent = '';
        errorBox.style.display = 'none';
        return;
      }
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function addError(message) {
      if (!message) return;
      const oldText = errorBox.style.display === 'block' ? errorBox.textContent : '';
      showError(oldText ? `${oldText} | ${message}` : message);
    }

    function updateSourceNames() {
      if (!sourceNames) return;
      sourceNames.textContent = currentFuelSource || '--';
    }

    function setFuelSource(value) {
      currentFuelSource = value || '--';
      updateSourceNames();
    }

    function setLoading(el, isLoading) {
      if (!el) return;
      el.classList.toggle('is-loading', !!isLoading);
    }

    function renderEmptyFuel(message = 'Chưa có dữ liệu xăng dầu.') {
      fuelCards.innerHTML = `<div class="empty">${message}</div>`;
      fuelUpdatedAt.textContent = '--';
    }

    function renderFuel(data) {
      const items = Array.isArray(data?.items) ? data.items : [];
      fuelCards.innerHTML = '';

      if (!items.length) {
        renderEmptyFuel();
        return;
      }

      items.forEach(item => {
        const zone2ChangeText = item.zone2_change == null
          ? ''
          : `<div class="muted-row ${deltaClass(item.zone2_change)}">Vùng 2: ${item.zone2_change > 0 ? '▲ Tăng' : item.zone2_change < 0 ? '▼ Giảm' : '— Không đổi'}${item.zone2_change === 0 ? '' : ` ${formatMoney(Math.abs(item.zone2_change), 'đ/lít')}`}</div>`;

        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-title">${item.name || 'Không rõ tên'}</div>
          <div class="card-price">${formatMoney(item.price, item.unit)}</div>
          <div class="card-sub ${deltaClass(item.change)}">${deltaText(item)}</div>
          ${item.note ? `<div class="muted-row">${item.note}</div>` : ''}
          ${item.prev_price != null ? `<div class="muted-row">Kỳ trước: ${formatMoney(item.prev_price, item.unit)}</div>` : ''}
          ${zone2ChangeText}
        `;
        fuelCards.appendChild(card);
      });

      fuelUpdatedAt.textContent = formatDateTime(data.updatedAt);
    }

    async function fetchFuelOnce(dateStr, signal) {
      const res = await fetch(`${FUEL_API_BASE}${dateStr}?t=${Date.now()}`, {
        cache: 'no-store',
        signal
      });

      if (!res.ok) {
        throw new Error(`Xăng dầu: HTTP ${res.status}`);
      }

      const raw = await res.json();
      const currentRows = Array.isArray(raw?.[0]) ? raw[0] : [];
      const previousRows = Array.isArray(raw?.[2]) ? raw[2] : [];

      if (!currentRows.length) {
        throw new Error('Xăng dầu: không có dữ liệu');
      }

      const previousMap = new Map(previousRows.map(item => [normalizeFuelName(item.title), item]));

      const items = currentRows.map(item => {
        const prev = previousMap.get(normalizeFuelName(item.title));
        const zone1 = Number(item.zone1_price ?? item.price ?? 0);
        const zone2 = Number(item.zone2_price ?? 0);
        const prevZone1 = Number(prev?.zone1_price ?? prev?.price ?? zone1);
        const prevZone2 = Number(prev?.zone2_price ?? zone2);

        return {
          name: item.title || 'Không rõ tên',
          price: zone1,
          unit: 'đ/lít',
          zone2_price: item.zone2_price ?? null,
          change: zone1 - prevZone1,
          prev_price: prevZone1,
          zone2_change: item.zone2_price != null && prev ? zone2 - prevZone2 : null,
          note: item.zone2_price != null ? `Vùng 2: ${formatMoney(zone2, 'đ/lít')}` : ''
        };
      });

      return {
        source: 'giaxanghomnay.com',
        updatedAt: currentRows[0]?.updated_at || currentRows[0]?.date || new Date().toISOString(),
        items
      };
    }

    async function fetchFuelData(selectedDateValue = '') {
      const baseDate = selectedDateValue
        ? new Date(`${selectedDateValue}T00:00:00`)
        : new Date();

      let lastError = null;

      for (let i = 0; i <= FUEL_FALLBACK_DAYS; i++) {
        const candidate = minusDays(baseDate, i);
        const dateStr = formatDateForApi(candidate);

        try {
          return await withTimeout(
            signal => fetchFuelOnce(dateStr, signal),
            NETWORK_TIMEOUT_MS
          );
        } catch (error) {
          lastError = error;
        }
      }

      const cached = getCache(CACHE_KEYS.fuel, 24 * 60 * 60 * 1000);
      if (cached) {
        return { ...cached, source: `${cached.source || 'giaxanghomnay.com'} (cache)` };
      }

      throw lastError || new Error('Xăng dầu: không tải được dữ liệu');
    }

    function renderCachedDataImmediately() {
      const cachedFuel = getCache(CACHE_KEYS.fuel, 24 * 60 * 60 * 1000);

      if (cachedFuel?.items?.length) {
        renderFuel(cachedFuel);
        setFuelSource(`${cachedFuel.source || 'giaxanghomnay.com'} (cache)`);
      } else {
        renderEmptyFuel('Đang tải dữ liệu xăng dầu...');
      }
    }

    async function refreshFuelOnly() {
      setLoading(fuelCards, true);
      try {
        const fuelData = await fetchFuelData(fuelDateInput.value);
        renderFuel(fuelData);
        setCache(CACHE_KEYS.fuel, fuelData);
        setFuelSource(fuelData.source || 'giaxanghomnay.com');
      } catch (err) {
        if (!fuelCards.children.length) {
          renderEmptyFuel('Không tải được dữ liệu xăng dầu.');
        }
        addError(`Xăng dầu lỗi: ${err?.message || 'Không rõ nguyên nhân'}`);
      } finally {
        setLoading(fuelCards, false);
      }
    }

    function refreshAll() {
      showError('');
      refreshFuelOnly();
    }

    function syncFuelDateDefault() {
      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth() + 1).padStart(2, '0');
      const d = String(today.getDate()).padStart(2, '0');
      fuelDateInput.value = `${y}-${m}-${d}`;
      fuelDateInput.max = `${y}-${m}-${d}`;
    }

    fuelDateInput.addEventListener('change', () => {
      showError('');
      refreshFuelOnly();
    });

    fuelTodayBtn.addEventListener('click', () => {
      syncFuelDateDefault();
      showError('');
      refreshFuelOnly();
    });

    Promise.all([
      loadPartial('mini-header.html', headerSlot),
      loadPartial('footer.html', footerSlot)
    ]).finally(() => {
      syncFuelDateDefault();
      updateSourceNames();
      renderCachedDataImmediately();
      refreshAll();
      setInterval(refreshAll, REFRESH_MS);
    });
  </script>
</body>
</html>
